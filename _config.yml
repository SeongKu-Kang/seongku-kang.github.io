resume_header_intro: "\nMy principal research interest lies in developing machine learning approaches for effective and efficient information retrieval (IR) systems. These systems have been broadly adopted in many web services, providing curation of web pages, news, and items for millions of people. <i>Effectiveness</i> and <i>efficiency</i> are key requirements of IR systems, i.e., the systems should provide accurate predictions with fast inference time. Naturally, those are two of my main research objectives."

